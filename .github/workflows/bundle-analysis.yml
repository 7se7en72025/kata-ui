name: Bundle Analysis

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  analyze:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Build
        run: ANALYZE=true npm run build
      - name: Comment PR with bundle size
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read the build output
            const buildDir = path.join('.next');
            let totalSize = 0;
            const files = [];

            function walkDir(dir) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  walkDir(fullPath);
                } else if (entry.name.endsWith('.js')) {
                  const stat = fs.statSync(fullPath);
                  totalSize += stat.size;
                  if (stat.size > 10000) {
                    files.push({ name: entry.name, size: (stat.size / 1024).toFixed(1) });
                  }
                }
              }
            }

            try {
              walkDir(path.join(buildDir, 'static'));
            } catch (e) {
              console.log('Could not read build output');
            }

            const sizeKB = (totalSize / 1024).toFixed(1);
            const body = `## Bundle Analysis\n\n| Metric | Value |\n|---|---|\n| Total JS Size | ${sizeKB} KB |\n| Files > 10KB | ${files.length} |\n\n> Run \`npm run build\` locally to see the full breakdown.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Bundle Analysis'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
