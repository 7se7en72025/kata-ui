name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Auto-version & Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "## What's Changed" > CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "### Features" >> CHANGELOG_BODY.md
            git log --pretty=format:"- %s" "$PREV_TAG"..HEAD --grep="^feat" >> CHANGELOG_BODY.md || true
            echo "" >> CHANGELOG_BODY.md
            echo "### Bug Fixes" >> CHANGELOG_BODY.md
            git log --pretty=format:"- %s" "$PREV_TAG"..HEAD --grep="^fix" >> CHANGELOG_BODY.md || true
            echo "" >> CHANGELOG_BODY.md
            echo "### Other Changes" >> CHANGELOG_BODY.md
            git log --pretty=format:"- %s" "$PREV_TAG"..HEAD --invert-grep --grep="^feat" --grep="^fix" >> CHANGELOG_BODY.md || true
          else
            git log --pretty=format:"- %s" HEAD >> CHANGELOG_BODY.md
          fi
          
          echo "" >> CHANGELOG_BODY.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> CHANGELOG_BODY.md
          
          cat CHANGELOG_BODY.md

      - name: Update package.json version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          node -e "const p=require('./package.json');p.version='$VERSION';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json
          git commit -m "chore: bump version to $TAG" || true
          git push

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_BODY.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
