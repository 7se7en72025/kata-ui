name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: "Git tag or commit SHA to rollback to"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string

env:
  NODE_VERSION: "20"

jobs:
  rollback:
    name: Rollback to ${{ inputs.version }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy rollback
        id: deploy
        run: |
          if [ "${{ inputs.environment }}" == "production" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            vercel pull --yes --environment=staging --token=${{ secrets.VERCEL_TOKEN }}
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
      - name: Health check
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}" || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "Rollback health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 5
          done
          echo "Rollback health check failed"
          exit 1
      - name: Notify
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MSG="Rollback to ${{ inputs.version }} on ${{ inputs.environment }} succeeded.\nURL: ${{ steps.deploy.outputs.url }}\nReason: ${{ inputs.reason }}"
          else
            MSG="Rollback to ${{ inputs.version }} on ${{ inputs.environment }} FAILED.\nReason: ${{ inputs.reason }}"
          fi
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"$MSG\"}"
          fi
      - name: Create rollback issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'succeeded' : 'FAILED';
            const emoji = status === 'succeeded' ? '✅' : '❌';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${emoji} Rollback ${status}: ${{ inputs.environment }} to ${{ inputs.version }}`,
              body: [
                '## Rollback Details',
                '',
                '| Field | Value |',
                '|---|---|',
                `| Environment | \`${{ inputs.environment }}\` |`,
                `| Version | \`${{ inputs.version }}\` |`,
                `| Reason | ${{ inputs.reason }} |`,
                `| Status | ${status} |`,
                `| Triggered by | @${{ github.actor }} |`,
                `| URL | ${{ steps.deploy.outputs.url }} |`,
              ].join('\n'),
              labels: ['rollback', 'incident']
            });
