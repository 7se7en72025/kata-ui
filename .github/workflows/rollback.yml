name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: "Git tag or commit SHA to rollback to"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string

env:
  NODE_VERSION: "20"

jobs:
  rollback:
    name: Rollback to ${{ inputs.version }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy rollback
        run: |
          if [ "${{ inputs.environment }}" == "production" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=staging --token=${{ secrets.VERCEL_TOKEN }}
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi
      - name: Notify
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MSG="Rollback to ${{ inputs.version }} on ${{ inputs.environment }} succeeded.\nReason: ${{ inputs.reason }}"
          else
            MSG="Rollback to ${{ inputs.version }} on ${{ inputs.environment }} FAILED.\nReason: ${{ inputs.reason }}"
          fi
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"$MSG\"}"
          fi
      - name: Create rollback issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'succeeded' : 'FAILED';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Rollback ${status}: ${{ inputs.environment }} to ${{ inputs.version }}`,
              body: `## Rollback Details\n- **Environment:** ${{ inputs.environment }}\n- **Version:** ${{ inputs.version }}\n- **Reason:** ${{ inputs.reason }}\n- **Status:** ${status}\n- **Triggered by:** @${{ github.actor }}`,
              labels: ['rollback', 'incident']
            });
